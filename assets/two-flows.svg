<svg width="680" height="420" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
<title>RAP two delivery flows</title>
<desc>Flow A: the Cloud Agent answers the user directly. Flow B: the Cloud Agent returns a draft to the Custodian, which refines and delivers; the Cloud Agent never answers the user.</desc>
<style>
  .ink { fill: #1a1a1a; }
  .ink-stroke { stroke: #1a1a1a; }
  @media (prefers-color-scheme: dark) {
    .ink { fill: #e6e6e6; }
    .ink-stroke { stroke: #e6e6e6; }
  }
</style>
<defs>
<marker id="arrowF" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="44" y="34" text-anchor="start" font-size="15" font-weight="500" letter-spacing="0.2" fill="#2f6fed">Flow A — direct delivery</text>
<text x="44" y="54" text-anchor="start" font-size="12.5" letter-spacing="0.3" class="ink" opacity="0.55">projection is enough; the agent answers</text>

<rect x="44" y="70" width="156" height="56" rx="16" class="ink" opacity="0.04"/>
<rect x="44" y="70" width="156" height="56" rx="16" fill="none" class="ink-stroke" stroke-width="1.25" opacity="0.4"/>
<text x="122" y="98" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" class="ink">Cloud Agent</text>

<line x1="200" y1="98" x2="280" y2="98" class="ink-stroke" stroke-width="1.25" opacity="0.55" marker-end="url(#arrowF)"/>

<rect x="282" y="70" width="156" height="56" rx="16" fill="#2f6fed"/>
<text x="360" y="98" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" fill="#ffffff">User</text>

<line x1="44" y1="156" x2="636" y2="156" class="ink-stroke" stroke-width="1" opacity="0.12"/>

<text x="44" y="192" text-anchor="start" font-size="15" font-weight="500" letter-spacing="0.2" fill="#2f6fed">Flow B — return to custodian</text>
<text x="44" y="212" text-anchor="start" font-size="12.5" letter-spacing="0.3" class="ink" opacity="0.55">projection is generic; the agent drafts, then stays silent</text>

<rect x="44" y="232" width="150" height="60" rx="16" class="ink" opacity="0.04"/>
<rect x="44" y="232" width="150" height="60" rx="16" fill="none" class="ink-stroke" stroke-width="1.25" opacity="0.4"/>
<text x="119" y="256" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" class="ink">Cloud Agent</text>
<text x="119" y="276" text-anchor="middle" dominant-baseline="central" font-size="12" letter-spacing="0.3" class="ink" opacity="0.55">drafts only</text>

<line x1="194" y1="262" x2="272" y2="262" class="ink-stroke" stroke-width="1.25" opacity="0.55" marker-end="url(#arrowF)"/>
<text x="233" y="252" text-anchor="middle" font-size="12" letter-spacing="0.3" class="ink" opacity="0.5">draft</text>

<rect x="274" y="232" width="150" height="60" rx="16" fill="#2f6fed"/>
<text x="349" y="256" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" fill="#ffffff">Custodian</text>
<text x="349" y="276" text-anchor="middle" dominant-baseline="central" font-size="12" letter-spacing="0.3" fill="#ffffff" opacity="0.8">refines privately</text>

<line x1="424" y1="262" x2="502" y2="262" stroke="#2f6fed" stroke-width="1.5" opacity="0.8" marker-end="url(#arrowF)"/>
<text x="463" y="252" text-anchor="middle" font-size="12" letter-spacing="0.3" fill="#2f6fed" opacity="0.8">final</text>

<rect x="504" y="232" width="132" height="60" rx="16" fill="#2f6fed"/>
<text x="570" y="262" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" fill="#ffffff">User</text>

<path d="M119 292 L119 356 L332 356" fill="none" class="ink-stroke" stroke-width="1.25" stroke-dasharray="2 6" stroke-linecap="round" opacity="0.35"/>
<rect x="234" y="338" width="200" height="38" rx="14" class="ink" opacity="0.03"/>
<rect x="234" y="338" width="200" height="38" rx="14" fill="none" class="ink-stroke" stroke-width="1" opacity="0.3"/>
<text x="334" y="357" text-anchor="middle" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" class="ink" opacity="0.55">agent never reaches the user</text>
</svg>
