<svg width="680" height="410" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
<title>RAP car example projection</title>
<desc>Three requested fields cross the boundary at different granularities: current car stays plain, location is generalized, income becomes a range.</desc>
<style>
  .ink { fill: #1a1a1a; }
  .ink-stroke { stroke: #1a1a1a; }
  @media (prefers-color-scheme: dark) {
    .ink { fill: #e6e6e6; }
    .ink-stroke { stroke: #e6e6e6; }
  }
</style>
<defs>
<marker id="arrowC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="152" y="36" text-anchor="middle" font-size="12.5" letter-spacing="0.3" class="ink" opacity="0.5">raw value · private</text>
<text x="528" y="36" text-anchor="middle" font-size="12.5" letter-spacing="0.3" fill="#2f6fed" opacity="0.85">what the agent receives</text>

<line x1="340" y1="58" x2="340" y2="334" class="ink-stroke" stroke-width="1" stroke-dasharray="2 6" stroke-linecap="round" opacity="0.3"/>

<rect x="44" y="66" width="216" height="62" rx="16" class="ink" opacity="0.04"/>
<rect x="44" y="66" width="216" height="62" rx="16" fill="none" class="ink-stroke" stroke-width="1.1" opacity="0.35"/>
<text x="64" y="90" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" class="ink">current car</text>
<text x="64" y="110" text-anchor="start" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" class="ink" opacity="0.55">Golf 7</text>
<line x1="262" y1="97" x2="416" y2="97" class="ink-stroke" stroke-width="1.1" opacity="0.5" marker-end="url(#arrowC)"/>
<text x="339" y="87" text-anchor="middle" font-size="12" letter-spacing="0.3" class="ink" opacity="0.55">plain</text>
<rect x="420" y="66" width="216" height="62" rx="16" fill="#2f6fed"/>
<text x="440" y="90" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" fill="#ffffff">Golf 7</text>
<text x="440" y="110" text-anchor="start" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" fill="#ffffff" opacity="0.78">passed as-is</text>

<rect x="44" y="160" width="216" height="62" rx="16" class="ink" opacity="0.04"/>
<rect x="44" y="160" width="216" height="62" rx="16" fill="none" class="ink-stroke" stroke-width="1.1" opacity="0.35"/>
<text x="64" y="184" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" class="ink">location</text>
<text x="64" y="204" text-anchor="start" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" class="ink" opacity="0.55">Via Roma 14, Torino</text>
<line x1="262" y1="191" x2="416" y2="191" class="ink-stroke" stroke-width="1.1" opacity="0.5" marker-end="url(#arrowC)"/>
<text x="339" y="181" text-anchor="middle" font-size="12" letter-spacing="0.3" class="ink" opacity="0.55">generalized</text>
<rect x="420" y="160" width="216" height="62" rx="16" fill="#2f6fed"/>
<text x="440" y="184" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" fill="#ffffff">Northern Italy</text>
<text x="440" y="204" text-anchor="start" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" fill="#ffffff" opacity="0.78">region only</text>

<rect x="44" y="254" width="216" height="62" rx="16" class="ink" opacity="0.04"/>
<rect x="44" y="254" width="216" height="62" rx="16" fill="none" class="ink-stroke" stroke-width="1.1" opacity="0.35"/>
<text x="64" y="278" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" class="ink">income</text>
<text x="64" y="298" text-anchor="start" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" class="ink" opacity="0.55">31,400 / year</text>
<line x1="262" y1="285" x2="416" y2="285" class="ink-stroke" stroke-width="1.1" opacity="0.5" marker-end="url(#arrowC)"/>
<text x="339" y="275" text-anchor="middle" font-size="12" letter-spacing="0.3" class="ink" opacity="0.55">range only</text>
<rect x="420" y="254" width="216" height="62" rx="16" fill="#2f6fed"/>
<text x="440" y="278" text-anchor="start" dominant-baseline="central" font-size="14" font-weight="500" letter-spacing="0.2" fill="#ffffff">20k – 40k band</text>
<text x="440" y="298" text-anchor="start" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" fill="#ffffff" opacity="0.78">never the exact figure</text>

<rect x="44" y="350" width="592" height="42" rx="14" fill="#2f6fed" opacity="0.06"/>
<rect x="44" y="350" width="592" height="42" rx="14" fill="none" stroke="#2f6fed" stroke-width="1" opacity="0.4"/>
<text x="340" y="371" text-anchor="middle" dominant-baseline="central" font-size="12.5" letter-spacing="0.3" fill="#2f6fed">the exact address and salary never leave the boundary</text>
</svg>
